<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รีวิวจากลูกค้า — วิษามิน WISAMIN</title>
<meta name="description" content="เสียงจริงจากลูกค้าวิษามินกว่า 12,480 รีวิว คะแนนเฉลี่ย 4.9 ดาว">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div data-header></div>

<div class="page-head">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">หน้าแรก</a> / รีวิว</div>
    <h1>เสียงจริงจากคนรักสุขภาพ</h1>
    <div class="hero-trust" style="margin-top:14px">
      <span class="stars" style="color:var(--gold);font-size:1.3rem">★★★★★</span>
      <span style="font-size:1.2rem;font-weight:800"><b data-count="4.9" data-decimals="1">4.9</b> / 5</span>
      <span>จาก <b data-count="12480">12,480</b> รีวิว</span>
    </div>
  </div>
</div>

<section>
  <div class="container">
    <div class="grid grid-3" data-reviews-grid></div>
  </div>
</section>

<div data-line-cta></div>
<div data-footer></div>

<script src="js/config.js"></script>
<script src="js/products.js"></script>
<script src="js/render.js"></script>
<script src="js/urgency.js"></script>
<script src="js/main.js"></script>
<script>
  var REVIEWS = [
    ['คุณศิริพร','กรุงเทพฯ · ลูกค้าประจำ','ศ','ชอบมากค่ะ ทานง่าย รสชาติดี พกไปทำงานสะดวก แอดไลน์ปรึกษาแล้วทีมงานแนะนำดีมาก'],
    ['คุณธนวัฒน์','เชียงใหม่ · นักออกกำลังกาย','ธ','เวย์โปรตีนละลายง่าย ไม่หวานเลี่ยน สั่งซ้ำหลายรอบแล้ว บริการดีจริง'],
    ['คุณพิมพ์ชนก','ขอนแก่น · พนักงานออฟฟิศ','พ','ทำงานหนักพักผ่อนน้อย เลยมองหาตัวช่วยดูแลตัวเอง วิษามินตอบโจทย์มาก'],
    ['คุณอนุชา','ชลบุรี · เจ้าของกิจการ','อ','สั่งเซ็ต Daily Essentials คุ้มมากเมื่อเทียบกับซื้อแยก แพ็กสวย ส่งไว'],
    ['คุณเบญจวรรณ','นนทบุรี · คุณแม่','บ','ชอบที่ทีมงานใจดี ตอบไลน์ไว ให้คำแนะนำเรื่องการดูแลสุขภาพดีมาก'],
    ['คุณกิตติศักดิ์','ภูเก็ต · ครูฟิตเนส','ก','โปรตีนพืชสำหรับสายวีแกนดีมาก ย่อยง่าย ไม่อืดท้อง แนะนำเลย'],
    ['คุณนภาพร','นครราชสีมา · พยาบาล','น','วิตามินซีทานง่าย เม็ดไม่ใหญ่ กลืนสบาย ราคาก็เข้าถึงได้'],
    ['คุณวรเดช','ระยอง · วิศวกร','ว','ทำงานในร่มทั้งวัน เลยเลือกวิตามินดี 3 มาเสริม พอใจกับคุณภาพ'],
    ['คุณสุดารัตน์','อุดรธานี · ฟรีแลนซ์','ส','คอลลาเจนชงดื่มอร่อยมาก รสองุ่นหอม ดื่มง่าย พกพาสะดวก'],
  ];
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelector('[data-reviews-grid]').innerHTML = REVIEWS.map(function (r) {
      return '<div class="review-card reveal"><div class="stars">★★★★★</div><p>"' + r[3] + '"</p>' +
        '<div class="review-who"><span class="av">' + r[2] + '</span><div><b>' + r[0] + '</b><br><small>' + r[1] + '</small></div></div></div>';
    }).join('');
    var slot = document.querySelector('[data-line-cta]');
    if (slot) slot.outerHTML = window.lineCtaBlock();
    if (window.initUrgency) window.initUrgency();
    if (window.initReveal) window.initReveal();
  });
</script>
</body>
</html>
